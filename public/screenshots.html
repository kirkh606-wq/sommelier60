<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>App Store Screenshots</title>
  <style>
    body { margin: 0; background: #1a1a1a; font-family: -apple-system, sans-serif; padding: 20px; }
    h1 { color: white; text-align: center; font-size: 20px; margin-bottom: 6px; }
    p { color: #aaa; text-align: center; font-size: 14px; margin-bottom: 24px; }
    .grid { display: flex; flex-direction: column; gap: 32px; max-width: 500px; margin: 0 auto; }
    .card { background: #2a2a2a; border-radius: 16px; overflow: hidden; }
    .card img { width: 100%; display: block; }
    .card a {
      display: block;
      text-align: center;
      padding: 14px;
      background: #7C3FA0;
      color: white;
      font-weight: 800;
      font-size: 15px;
      text-decoration: none;
    }
    .label { color: #ccc; font-size: 13px; font-weight: 700; padding: 10px 14px 4px; }
  </style>
</head>
<body>
  <h1>📸 App Store Screenshots</h1>
  <p>Press & hold each image → "Add to Photos"</p>
  <div class="grid">
    <div class="card">
      <div class="label">1 — Home Screen</div>
      <img src="https://media.base44.com/images/public/6a0f1419615b4c17815775c8/62bd14b35_generated_image.png" />
      <a href="https://media.base44.com/images/public/6a0f1419615b4c17815775c8/62bd14b35_generated_image.png" target="_blank">Open Full Size →</a>
    </div>
    <div class="card">
      <div class="label">2 — Journey Map</div>
      <img src="https://media.base44.com/images/public/6a0f1419615b4c17815775c8/f676ab78c_generated_image.png" />
      <a href="https://media.base44.com/images/public/6a0f1419615b4c17815775c8/f676ab78c_generated_image.png" target="_blank">Open Full Size →</a>
    </div>
    <div class="card">
      <div class="label">3 — Quiz Screen</div>
      <img src="https://media.base44.com/images/public/6a0f1419615b4c17815775c8/3028ba742_generated_image.png" />
      <a href="https://media.base44.com/images/public/6a0f1419615b4c17815775c8/3028ba742_generated_image.png" target="_blank">Open Full Size →</a>
    </div>
    <div class="card">
      <div class="label">4 — Certificate</div>
      <img src="https://media.base44.com/images/public/6a0f1419615b4c17815775c8/d77d2e790_generated_image.png" />
      <a href="https://media.base44.com/images/public/6a0f1419615b4c17815775c8/d77d2e790_generated_image.png" target="_blank">Open Full Size →</a>
    </div>
  </div>
</body>
</html>
